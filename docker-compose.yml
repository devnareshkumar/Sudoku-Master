version: '3.8'

services:
  sudoku-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-4000}:4000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=4000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment for HTTPS with certificates
      # - /path/to/certs:/etc/nginx/certs:ro
    depends_on:
      - sudoku-app
    restart: unless-stopped
    # Only enable this service if you have nginx.conf configured
    # profiles: ["with-proxy"]
