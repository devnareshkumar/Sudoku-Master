# Netlify configuration - YAML format
# This file works alongside netlify.toml and can override some UI settings

build:
  command: "npm run build"
  functions: "" # Disable functions directory
  publish: dist/app/browser

# Prevent Angular runtime plugin from trying to create edge functions
env:
  # Tell Netlify to skip installing the Angular plugin
  NETLIFY_SKIP_ANGULAR_RUNTIME: "true"

# Service-to-service redirects for SPA
redirects:
  - from: "/*"
    to: "/index.html"
    status: 200

# Headers configuration
headers:
  - path: "/*.js"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=31536000, immutable"
  
  - path: "/*.css"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=31536000, immutable"
  
  - path: "/*"
    headers:
      - key: "X-Content-Type-Options"
        value: "nosniff"
      - key: "X-Frame-Options"
        value: "SAMEORIGIN"
      - key: "X-XSS-Protection"
        value: "1; mode=block"
      - key: "Referrer-Policy"
        value: "no-referrer-when-downgrade"
